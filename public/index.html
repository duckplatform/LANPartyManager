<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LANPartyManager</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<nav class="navbar">
  <a class="brand" href="/"><span>LAN</span>PartyManager</a>
  <div class="navbar-links">
    <span id="nav-username" style="color:var(--text-muted);font-size:.9rem;padding:.3rem .6rem;"></span>
    <a id="nav-dashboard" href="/dashboard.html">Mon espace</a>
    <a id="nav-admin"     href="/admin.html">Administration</a>
    <a id="nav-login"     href="/login.html">Connexion</a>
    <a id="nav-register"  href="/register.html">Inscription</a>
    <button id="nav-logout">Déconnexion</button>
  </div>
</nav>

<main class="hero">
  <div class="hero-icon">🎮</div>
  <h1>Bienvenue sur <span>LANPartyManager</span></h1>
  <p>La plateforme de gestion des membres de votre association de jeux vidéo.</p>
  <div class="hero-actions" id="hero-actions">
    <a class="btn btn--primary" href="/login.html">Se connecter</a>
    <a class="btn btn--outline" href="/register.html">S'inscrire</a>
  </div>
</main>

<script src="/js/api.js"></script>
<script>
  initNavbar();

  const user = getUser();
  const token = getToken();
  if (token && user) {
    const actions = document.getElementById('hero-actions');
    actions.innerHTML = user.role === 'admin'
      ? `<a class="btn btn--primary" href="/admin.html">Panneau admin</a>
         <a class="btn btn--secondary" href="/dashboard.html">Mon profil</a>`
      : `<a class="btn btn--primary" href="/dashboard.html">Mon espace</a>`;
  }
</script>
</body>
</html>
